<!DOCTYPE html>
<html lang="en">
<!-- Demo page: loads the pricing-card module and shows one centered instance. -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pricing card</title>
  <style>
    /* Page chrome only; card styling lives inside the component shadow root. */
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: linear-gradient(160deg, #f1f5f9 0%, #e2e8f0 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
    }
  </style>
  <!-- type="module" defers execution until after parse; registers <pricing-card> once. -->
  <script type="module" src="./components/pricing-card.js"></script>
</head>
<body>
  <!-- slot="features" projects this list into the component’s named slot. -->
  <pricing-card
    plan-title="Basic Plan"
    price="$9.99"
    price-period="/ month"
    cta-label="Start trial"
  >
    <ul slot="features">
      <li>1 GB storage</li>
      <li>Basic support</li>
      <li>All core features</li>
    </ul>
  </pricing-card>
</body>
</html>
